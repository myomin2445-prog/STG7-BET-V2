<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STG7 BET TRACKER</title>

<style>
body{
    margin:0;
    background:#000;
    color:#fff;
    font-family:Arial,sans-serif;
}
.header{
    background:#004dff;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}
.date{
    background:#005eff;
    padding:10px;
    text-align:center;
    font-size:20px;
}
table{
    width:100%;
    border-collapse:collapse;
    background:#fff;
    color:#000;
}
th{
    background:#ddd;
    padding:10px;
}
td{
    padding:10px;
    border:1px solid #ccc;
    text-align:center;
}
.red{
    color:red;
    font-weight:bold;
}
.team{
    font-weight:bold;
}
.footer{
    background:#004dff;
    padding:15px;
    text-align:center;
    color:#fff;
}
</style>

</head>
<body>

<div class="header">
STG7 BET TRACKER
</div>

<div class="date" id="dateBox">
Loading...
</div>

<table>

<thead>
<tr>
<th>KR</th>
<th>BODY</th>
<th>HOME</th>
<th>RESULT</th>
<th>AWAY</th>
<th>GOAL+</th>
</tr>
</thead>

<tbody id="matchTable">

<tr>
<td colspan="6">
Loading...
</td>
</tr>

</tbody>

</table>

<div class="footer">
STG7 BET TRACKER
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";

import {
  getFirestore,
  collection,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const dateBox = document.getElementById("dateBox");
const matchTable = document.getElementById("matchTable");

onSnapshot(collection(db, "matches"), (snapshot) => {
  let html = "";
  let currentDate = "";

  if (snapshot.empty) {
    dateBox.innerText = "STG7 BET V2";
    matchTable.innerHTML = "<tr><td colspan='6'>No matches yet</td></tr>";
    return;
  }

  snapshot.forEach((doc) => {
    const m = doc.data();

    if (m.date) currentDate = m.date;

    html += `
      <tr>
        <td><b>${m.kr || ""}</b></td>
        <td class="red">${m.body || ""}</td>
        <td class="team">${m.home || ""}</td>
        <td>${m.result || ""}</td>
        <td class="team">${m.away || ""}</td>
        <td class="red">${m.goal || ""}</td>
      </tr>
    `;
  });

  dateBox.innerText = currentDate || "STG7 BET V2";
  matchTable.innerHTML = html;

}, (error) => {
  dateBox.innerText = "Firebase Error";
  matchTable.innerHTML = `<tr><td colspan="6">${error.message}</td></tr>`;
});

</script>
</body>
</html>
