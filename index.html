<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 BET</title>
<style>
body{margin:0;background:#071107;color:white;font-family:Arial;padding:14px;padding-bottom:75px}
.box{max-width:560px;margin:auto}
.header{background:#0f7a22;padding:18px;border-radius:14px;text-align:center;font-size:28px;font-weight:bold}
.card{background:#101c10;padding:15px;border-radius:14px;margin:12px 0;border:1px solid #1f3d1f}
.balance{font-size:30px;color:#ffd700;font-weight:bold;text-align:center}
.small{color:#bbb;font-size:14px}
.match{font-size:20px;font-weight:bold;margin-bottom:8px}
.info{color:#ccc;margin:5px 0}
.goal{color:#ffd700;font-weight:bold}
.odds{color:#00ff66;font-weight:bold}
button{width:100%;padding:13px;margin-top:10px;border:0;border-radius:9px;background:#00a000;color:white;font-weight:bold;font-size:16px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#101c10;border-top:1px solid #1f3d1f;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 0}
.nav a{text-align:center;color:white;text-decoration:none;font-size:13px}
</style>
</head>

<body>
<div class="box">
<div class="header">⚽ STG7 BET</div>

<div class="card">
  <div class="small" id="userBox">Checking login...</div>
  <p class="small" style="text-align:center">Current Balance</p>
  <div class="balance" id="balanceBox">Loading...</div>
</div>

<h3>🔥 Today's Matches</h3>
<div id="matchList">
  <p class="small">Loading matches...</p>
</div>
</div>

<div class="nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="bet.html">⚽<br>Bet</a>
  <a href="mybets.html">🎫<br>My Bets</a>
  <a href="wallet.html">💰<br>Wallet</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const userBox = document.getElementById("userBox");
const balanceBox = document.getElementById("balanceBox");
const matchList = document.getElementById("matchList");

const money = n => Number(n || 0).toLocaleString() + " Ks";

onAuthStateChanged(auth, user=>{
  if(!user){
    location.href="login.html";
    return;
  }

  userBox.innerText = "👤 " + user.email;

  onSnapshot(doc(db,"users",user.uid), snap=>{
    if(snap.exists()){
      balanceBox.innerText = money(snap.data().balance);
    }else{
      balanceBox.innerText = "0 Ks";
    }
  });
});

onSnapshot(collection(db,"matches"), snap=>{
  let html = "";

  if(snap.empty){
    matchList.innerHTML = "<p class='small'>No matches yet</p>";
    return;
  }

  snap.forEach(d=>{
    const m = d.data();

    html += `
      <div class="card">
        <div class="match">⚽ ${m.home || ""} vs ${m.away || ""}</div>
        <div class="info">🏆 ${m.league || m.body || "League"}</div>
        <div class="info">📅 ${m.date || ""} ⏰ ${m.time || m.kr || ""}</div>
        <div class="info goal">ဂိုးလိုင်း: ${m.goal || "-"}</div>
        <div class="info odds">ပေါက်ကြေး: ${m.odds || m.body || "-"}</div>
        <button onclick="location.href='bet.html'">BET</button>
      </div>
    `;
  });

  matchList.innerHTML = html;
});
</script>
</body>
</html>
