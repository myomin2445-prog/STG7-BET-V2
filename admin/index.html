<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Admin</title>
<style>
body{margin:0;background:#0b0b0b;color:#fff;font-family:Arial;padding:14px}
.box{max-width:520px;margin:auto}
h2{text-align:center}
input{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:0;box-sizing:border-box}
button{width:100%;padding:13px;margin:6px 0;border:0;border-radius:8px;color:white;font-weight:bold}
.login{background:#0066ff}.save{background:#00a000}.update{background:#ff9800}.del{background:#d40000}.edit{background:#555}.logout{background:#444}
.card{background:#1d1d1d;margin:10px 0;padding:12px;border-radius:10px}
.hidden{display:none}
.small{color:#bbb;font-size:13px}
</style>
</head>
<body>

<div class="box">

<div id="loginBox">
<h2>🔐 STG7 Admin Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button class="login" id="loginBtn">LOGIN</button>
</div>

<div id="adminBox" class="hidden">
<h2>⚽ STG7 Admin</h2>
<button class="logout" id="logoutBtn">LOGOUT</button>

<input id="date" placeholder="Date">
<input id="kr" placeholder="KR">
<input id="body" placeholder="BODY">
<input id="home" placeholder="HOME">
<input id="result" placeholder="RESULT">
<input id="away" placeholder="AWAY">
<input id="goal" placeholder="GOAL+">

<button class="save" id="saveBtn">SAVE</button>
<button class="update hidden" id="updateBtn">UPDATE</button>

<input id="search" placeholder="Search match...">

<div id="list"></div>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let editId = null;
let allMatches = [];

const ids = x => document.getElementById(x);

function data(){
  return {
    date: ids("date").value,
    kr: ids("kr").value,
    body: ids("body").value,
    home: ids("home").value,
    result: ids("result").value,
    away: ids("away").value,
    goal: ids("goal").value
  };
}

function fill(m){
  ids("date").value=m.date||"";
  ids("kr").value=m.kr||"";
  ids("body").value=m.body||"";
  ids("home").value=m.home||"";
  ids("result").value=m.result||"";
  ids("away").value=m.away||"";
  ids("goal").value=m.goal||"";
}

function clear(){
  fill({});
  editId=null;
  ids("saveBtn").classList.remove("hidden");
  ids("updateBtn").classList.add("hidden");
}

ids("loginBtn").onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth, ids("email").value, ids("password").value);
  }catch(e){ alert("Login Error: "+e.message); }
};

ids("logoutBtn").onclick = ()=> signOut(auth);

onAuthStateChanged(auth, user=>{
  ids("loginBox").classList.toggle("hidden", !!user);
  ids("adminBox").classList.toggle("hidden", !user);
});

ids("saveBtn").onclick = async ()=>{
  try{
    await addDoc(collection(db,"matches"), data());
    clear();
    alert("SAVE SUCCESS");
  }catch(e){ alert("Save Error: "+e.message); }
};

ids("updateBtn").onclick = async ()=>{
  try{
    await updateDoc(doc(db,"matches",editId), data());
    clear();
    alert("UPDATE SUCCESS");
  }catch(e){ alert("Update Error: "+e.message); }
};

window.editMatch = (id)=>{
  const item = allMatches.find(x=>x.id===id);
  if(!item) return;
  editId=id;
  fill(item);
  ids("saveBtn").classList.add("hidden");
  ids("updateBtn").classList.remove("hidden");
  window.scrollTo(0,0);
};

window.deleteMatch = async (id)=>{
  if(confirm("Delete this match?")){
    await deleteDoc(doc(db,"matches",id));
  }
};

function render(){
  const q = ids("search").value.toLowerCase();
  let html="";
  allMatches
    .filter(m => (m.home+" "+m.away+" "+m.kr+" "+m.body+" "+m.goal).toLowerCase().includes(q))
    .forEach(m=>{
      html += `
      <div class="card">
        <b>${m.kr||""}</b> | BODY: ${m.body||""}<br>
        ${m.home||""} VS ${m.away||""}<br>
        Result: ${m.result||"-"}<br>
        GOAL+: ${m.goal||""}<br>
        <span class="small">Date: ${m.date||""}</span>
        <button class="edit" onclick="editMatch('${m.id}')">EDIT</button>
        <button class="del" onclick="deleteMatch('${m.id}')">DELETE</button>
      </div>`;
    });
  ids("list").innerHTML = html || "<p class='small'>No matches</p>";
}

ids("search").oninput = render;

onSnapshot(collection(db,"matches"), snap=>{
  allMatches=[];
  snap.forEach(d=> allMatches.push({id:d.id,...d.data()}));
  render();
});
</script>

</body>
</html>
