<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Admin Match</title>

<style>
body{
  margin:0;
  background:#050505;
  color:white;
  font-family:Arial;
  padding:14px;
  padding-bottom:70px;
}

.box{
  max-width:720px;
  margin:auto;
}

h2{
  text-align:center;
  color:#ffd700;
}

input,select,button{
  width:100%;
  padding:13px;
  margin:7px 0;
  border:0;
  border-radius:9px;
  box-sizing:border-box;
  font-size:16px;
}

input,select{
  background:#111;
  color:white;
  border:1px solid #333;
}

button{
  color:white;
  font-weight:bold;
}

.login{background:#0066ff}
.logout{background:#444}
.save{background:#00a000}
.update{background:#ff9800}
.edit{background:#555}
.del{background:#d40000}

.card{
  background:#141414;
  padding:15px;
  border-radius:14px;
  margin:12px 0;
  border:1px solid #3a3200;
}

.hidden{display:none}

.small{
  color:#bbb;
  font-size:13px;
}

.title{
  background:#111;
  border:1px solid #ffd700;
  border-radius:14px;
  padding:14px;
  text-align:center;
  color:#ffd700;
  font-size:24px;
  font-weight:bold;
  margin-bottom:12px;
}

.formBox{
  background:#111;
  border:1px solid #333;
  border-radius:14px;
  padding:12px;
  margin:12px 0;
}

.matchName{
  font-size:20px;
  font-weight:bold;
  color:#fff;
  text-align:center;
}

.gold{color:#ffd700}
.green{color:#00ff66}
.red{color:#ff4444}
.yellow{color:#ffdf00}

.row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.statusOpen{color:#00ff66}
.statusClosed{color:#ffdf00}
.statusFinished{color:#ff4444}
</style>
</head>

<body>

<div class="box">

<div id="loginBox">
  <div class="title">🔐 STG7 ADMIN LOGIN</div>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button class="login" id="loginBtn">LOGIN</button>
</div>

<div id="adminBox" class="hidden">
  <div class="title">⚽ STG7 MATCH MANAGER</div>
  <button class="logout" id="logoutBtn">LOGOUT</button>

  <div class="formBox">
    <input id="league" placeholder="League">
    <input id="home" placeholder="Home Team">
    <input id="away" placeholder="Away Team">

    <div class="row">
      <input id="date" placeholder="Date 27/06/2026">
      <input id="time" placeholder="Time 09:00PM">
    </div>

    <input id="goal" placeholder="Goal Line ဥပမာ 2+80 / 1-50">
    <input id="odds" placeholder="Match Odds ဥပမာ 1+40 / 1-50">
    <input id="result" placeholder="Result ဥပမာ 2-1">

    <select id="status">
      <option value="Open">🟢 Open</option>
      <option value="Closed">🟡 Closed</option>
      <option value="Finished">🔴 Finished</option>
    </select>

    <button class="save" id="saveBtn">SAVE MATCH</button>
    <button class="update hidden" id="updateBtn">UPDATE MATCH</button>
  </div>

  <input id="search" placeholder="Search match...">
  <div id="list"><p class="small">Loading...</p></div>
</div>

</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  getDocs,
  getDoc,
  query,
  where,
  serverTimestamp,
  increment
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let allMatches = [];
let editId = null;

const ids = x => document.getElementById(x);

const money = n => "₩" + Number(n || 0).toLocaleString();
  function parseAsianLine(text){
  text = String(text || "").trim();

  const base = parseInt(text);
  if(isNaN(base)) return 0;

  if(text.includes("+")) return base - 0.25;
  if(text.includes("-50")) return base + 0.25;
  if(text.endsWith("-")) return base + 0.5;
  if(text.includes("=")) return base;

  return base;
}

function getData(){
  return {
    league: ids("league").value.trim(),
    home: ids("home").value.trim(),
    away: ids("away").value.trim(),
    date: ids("date").value.trim(),
    time: ids("time").value.trim(),
    goal: ids("goal").value.trim(),
    odds: ids("odds").value.trim(),
    result: ids("result").value.trim(),
    status: ids("status").value
  };
}

function fill(m){
  ids("league").value = m.league || "";
  ids("home").value = m.home || "";
  ids("away").value = m.away || "";
  ids("date").value = m.date || "";
  ids("time").value = m.time || "";
  ids("goal").value = m.goal || "";
  ids("odds").value = m.odds || "";
  ids("result").value = m.result || "";
  ids("status").value = m.status || "Open";
}

function clearForm(){
  fill({});
  editId = null;
  ids("saveBtn").classList.remove("hidden");
  ids("updateBtn").classList.add("hidden");
}

ids("loginBtn").onclick = async ()=>{
  try{
    await signInWithEmailAndPassword(auth, ids("email").value, ids("password").value);
  }catch(e){
    alert("Login Error: " + e.message);
  }
};

ids("logoutBtn").onclick = ()=> signOut(auth);

onAuthStateChanged(auth, user=>{
  ids("loginBox").classList.toggle("hidden", !!user);
  ids("adminBox").classList.toggle("hidden", !user);
});

ids("saveBtn").onclick = async ()=>{
  const data = getData();

  if(!data.home || !data.away){
    alert("Home Team နဲ့ Away Team ထည့်ပါ");
    return;
  }

  try{
    await addDoc(collection(db,"matches"),{
      ...data,
      createdAt: serverTimestamp()
    });

    clearForm();
    alert("MATCH SAVED");
  }catch(e){
    alert("Save Error: " + e.message);
  }
};

ids("updateBtn").onclick = async ()=>{
  if(!editId){
    alert("Edit match မရွေးရသေးပါ");
    return;
  }

  try{
    await updateDoc(doc(db,"matches",editId), getData());

    await settleMatch(editId);

    clearForm();
    alert("MATCH UPDATED");
  }catch(e){
    alert("Update Error: " + e.message);
  }
};

window.editMatch = function(id){
  const item = allMatches.find(x => x.id === id);
  if(!item) return;

  editId = id;
  fill(item);
  ids("saveBtn").classList.add("hidden");
  ids("updateBtn").classList.remove("hidden");
  window.scrollTo(0,0);
};

window.deleteMatch = async function(id){
  if(confirm("Delete this match?")){
    try{
      await deleteDoc(doc(db,"matches",id));
    }catch(e){
      alert("Delete Error: " + e.message);
    }
  }
};
  async function settleMatch(matchId){
  const matchSnap = await getDoc(doc(db,"matches",matchId));
  if(!matchSnap.exists()) return;

  const match = matchSnap.data();
  if(!match.result) return;

  const [homeScore, awayScore] = match.result.split("-").map(Number);
  if(isNaN(homeScore) || isNaN(awayScore)) return;

  const betQuery = query(
    collection(db,"bets"),
    where("matchId","==",matchId),
    where("status","==","Pending")
  );

  const betSnap = await getDocs(betQuery);

  for(const betDoc of betSnap.docs){
    const bet = betDoc.data();
    let status = "Lost";

    if(bet.betType==="Home" && homeScore>awayScore) status="Won";
    if(bet.betType==="Away" && awayScore>homeScore) status="Won";
    if(bet.betType==="Draw" && homeScore===awayScore) status="Won";

    const totalGoal = homeScore + awayScore;

    if(bet.betType==="Over"){
      const line = parseAsianLine(bet.goalOdd || bet.goal);
      if(totalGoal > line) status="Won";
    }

    if(bet.betType==="Under"){
      const line = parseAsianLine(bet.goalOdd || bet.goal);
      if(totalGoal < line) status="Won";
    }

    const stake = Number(bet.stake || 0);
    let winAmount = 0;

    if(status==="Won"){
      const oddText = (bet.betType==="Over" || bet.betType==="Under")
        ? (bet.goalOdd || bet.goal || "")
        : (bet.matchOdd || bet.odds || "");

      const found = oddText.match(/[+-]\d+/);
      let percent = 100;
      if(found) percent = Number(found[0]);

      if(oddText.includes("+")){
        winAmount = stake + (stake * percent / 100);
      }else if(oddText.includes("-")){
        winAmount = stake - (stake * Math.abs(percent) / 100);
      }else{
        winAmount = stake * 2;
      }

      await updateDoc(doc(db,"users",bet.userId),{
        balance: increment(winAmount)
      });
    }

    await updateDoc(doc(db,"bets",betDoc.id),{
      status: status,
      winAmount: winAmount,
      settledPaid: true,
      settledAt: new Date()
    });
  }
}

function render(){
  const q = ids("search").value.toLowerCase();
  let html = "";

  allMatches
  .filter(m => (
    (m.home||"") + " " +
    (m.away||"") + " " +
    (m.league||"") + " " +
    (m.goal||"") + " " +
    (m.odds||"") + " " +
    (m.status||"")
  ).toLowerCase().includes(q))
  .forEach(m=>{
    const statusClass =
      m.status==="Finished" ? "statusFinished" :
      m.status==="Closed" ? "statusClosed" : "statusOpen";

    html += `
    <div class="card">
      <div class="matchName">⚽ ${m.home || "-"} VS ${m.away || "-"}</div>
      <p>🏆 League : <span class="gold">${m.league || "-"}</span></p>
      <p>📅 ${m.date || "-"} | ⏰ ${m.time || "-"}</p>
      <p>🥅 Goal : ${m.goal || "-"}</p>
      <p>💰 Odds : ${m.odds || "-"}</p>
      <p>📊 Result : <span class="yellow">${m.result || "-"}</span></p>
      <p>Status : <b class="${statusClass}">${m.status || "Open"}</b></p>

      <button class="edit" onclick="editMatch('${m.id}')">EDIT</button>
      <button class="del" onclick="deleteMatch('${m.id}')">DELETE</button>
    </div>`;
  });

  ids("list").innerHTML = html || "<p class='small'>No matches found</p>";
}

ids("search").oninput = render;

onSnapshot(collection(db,"matches"), snap=>{
  allMatches = [];
  snap.forEach(d=> allMatches.push({id:d.id,...d.data()}));
  render();
});
</script>

</body>
</html>
