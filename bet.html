<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Single
</head>
<style>
body{margin:0;background:#050505;color:white;font-family:Arial;padding:10px 8px 70px}
.box{max-width:620px;margin:auto}
h2{text-align:center;color:#ffd700;margin:10px 0}
.user{text-align:center;color:#00ff66;font-size:13px}
.balance{text-align:center;color:#ffd700;font-size:20px;font-weight:bold;margin:8px 0 12px}
.league{background:#0b7a24;color:#fff;padding:9px 10px;border-radius:6px 6px 0 0;font-weight:bold}
.matchRow{background:#151515;border-bottom:1px solid #333;padding:10px}
.time{color:#bbb;font-size:12px;margin-bottom:8px}
.teams{display:grid;grid-template-columns:1fr 70px 1fr;align-items:center;text-align:center;font-size:16px}
.mid{color:#ffd700;font-weight:bold}
.market{display:grid;grid-template-columns:1fr 70px 1fr;align-items:center;text-align:center;margin-top:8px;color:#ccc}
.oddsText{color:#00ff66;font-weight:bold}
.betBtn{background:#00a000;color:white;border:0;border-radius:6px;padding:9px;font-weight:bold;margin-top:8px;width:100%}
input,select,button{box-sizing:border-box;font-size:16px}
.betForm{background:#202020;padding:10px;border-radius:8px;margin-top:8px}
.betForm select,.betForm input{width:100%;padding:12px;margin:6px 0;border:0;border-radius:7px}
.quick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.quick button{background:#333;color:white;border:0;border-radius:7px;padding:10px}
.confirm{background:#00a000!important;color:white!important;width:100%;padding:12px;border:0;border-radius:7px;margin-top:6px}
.close{background:#555!important;color:white!important;width:100%;padding:12px;border:0;border-radius:7px;margin-top:6px}
.small{color:#bbb;font-size:13px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#101c10;border-top:1px solid #1f3d1f;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 0}
.nav a{text-align:center;color:white;text-decoration:none;font-size:13px}
</style>
<body>
<div class="box">
<h2>🎫 STG7 SINGLE BET</h2>
<div class="user" id="userBox">Checking login...</div>
<div class="balance" id="balanceBox">Balance: Loading...</div>
<div id="matchList"><p class="small">Loading matches...</p></div>
</div>

<div class="nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="bet.html">⚽<br>Bet</a>
  <a href="mybets.html">🎫<br>My Bets</a>
  <a href="wallet.html">💰<br>Wallet</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, onSnapshot,
  addDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let matchesData = [];

const userBox = document.getElementById("userBox");
const balanceBox = document.getElementById("balanceBox");
const matchList = document.getElementById("matchList");

const money = n => Number(n || 0).toLocaleString() + " Ks";

onAuthStateChanged(auth, user=>{
  if(!user){
    location.href = "login.html";
    return;
  }

  currentUser = user;
  userBox.innerText = "Login: " + user.email;

  onSnapshot(doc(db,"users",user.uid), snap=>{
    if(snap.exists()){
      balanceBox.innerText = "Balance: " + money(snap.data().balance);
    }else{
      balanceBox.innerText = "Balance: 0 Ks";
    }
  });
});

window.openBet = id=>{
  document.querySelectorAll(".betForm").forEach(f=>f.style.display="none");
  document.getElementById("form_"+id).style.display="block";
};

window.closeBet = id=>{
  document.getElementById("form_"+id).style.display="none";
};

window.quickStake = (id,amount)=>{
  document.getElementById("stake_"+id).value = amount;
};

window.saveBet = async id=>{
  if(!currentUser){
    alert("Login အရင်ဝင်ပါ");
    return;
  }

  const m = matchesData.find(x=>x.id===id);
  if(!m){
    alert("Match မတွေ့ပါ");
    return;
  }

  if(m.status === "Closed"){
    alert("ဒီပွဲက ပိတ်ထားပြီးပါပြီ");
    return;
  }

  const betType = document.getElementById("betType_"+id).value;
  const stake = Number(document.getElementById("stake_"+id).value || 0);

  if(!stake || stake <= 0){
    alert("လောင်းငွေထည့်ပါ");
    return;
  }

  try{
    const userRef = doc(db,"users",currentUser.uid);
    const userSnap = await getDoc(userRef);

    if(!userSnap.exists()){
      alert("User wallet မတွေ့ပါ");
      return;
    }

    const balance = Number(userSnap.data().balance || 0);

    if(balance < stake){
      alert("လက်ကျန်ငွေ မလုံလောက်ပါ");
      return;
    }

    await addDoc(collection(db,"bets"),{
      userId: currentUser.uid,
      userEmail: currentUser.email,

      matchId: id,
      match: (m.home || "") + " vs " + (m.away || ""),
      league: m.league || "",
      home: m.home || "",
      away: m.away || "",
      date: m.date || "",
      time: m.time || "",
      goal: m.goal || "",
      odds: m.odds || "",
      betType: betType,
      stake: stake,
      status: "Pending",
      winAmount: 0,
      createdAt: serverTimestamp()
    });

    await updateDoc(userRef,{ balance: balance - stake });

    alert("BET SAVED SUCCESS");
    document.getElementById("stake_"+id).value = "";
    closeBet(id);

  }catch(e){
    alert("ERROR: " + e.message);
  }
};

onSnapshot(collection(db,"matches"), snap=>{
  matchesData = [];
  let html = "";

  snap.forEach(d=>{
    const m = {id:d.id,...d.data()};
    if((m.status || "Open") !== "Open") return;

    matchesData.push(m);
html += `
<div class="league">🏆 ${m.league || "-"}</div>

<div class="matchRow">
  <div class="time">🕒 ${m.date || "-"} ${m.time || "-"}</div>

  <div class="teams">
    <div>${m.home || "-"}</div>
    <div class="mid">${m.goal || "-"}</div>
    <div>${m.away || "-"}</div>
  </div>

  <div class="market">
    <div>Over</div>
    <div class="oddsText">${m.odds || "-"}</div>
    <div>Under</div>
  </div>

  <button class="betBtn" onclick="openBet('${d.id}')">BET</button>

  <div class="betForm" id="form_${d.id}" style="display:none">
    <select id="betType_${d.id}">
      <option value="Over">Over</option>
      <option value="Under">Under</option>
      <option value="Home">Home</option>
      <option value="Away">Away</option>
      <option value="Draw">Draw</option>
    </select>

    <input id="stake_${d.id}" type="number" placeholder="လောင်းငွေ ဥပမာ 50000">

    <div class="quick">
      <button onclick="quickStake('${d.id}',10000)">10,000</button>
      <button onclick="quickStake('${d.id}',20000)">20,000</button>
      <button onclick="quickStake('${d.id}',50000)">50,000</button>
      <button onclick="quickStake('${d.id}',100000)">100,000</button>
      <button onclick="quickStake('${d.id}',200000)">200,000</button>
      <button onclick="quickStake('${d.id}',500000)">500,000</button>
    </div>

    <button class="confirm" onclick="saveBet('${d.id}')">CONFIRM BET</button>
    <button class="close" onclick="closeBet('${d.id}')">CANCEL</button>
  </div>
</div>`;
  });

  matchList.innerHTML = html || "<p class='small'>Open matches မရှိသေးပါ</p>";
});
</script>
</body>
</html>
