<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Single Bet</title>
<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial;padding:15px}
.box{max-width:520px;margin:auto}
h2{text-align:center}
.card{background:#1b1b1b;padding:15px;border-radius:12px;margin:12px 0}
.match{font-size:22px;font-weight:bold}
.info{color:#bbb;margin:8px 0;font-size:17px}
input,select,button{width:100%;padding:14px;margin:8px 0;border:0;border-radius:9px;box-sizing:border-box;font-size:16px}
button{background:#00a000;color:white;font-weight:bold}
.betForm{background:#222;padding:13px;border-radius:12px;margin-top:12px}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick button{background:#333}
.close{background:#555}
.small{color:#bbb;font-size:13px}
.goal{color:#ffdf00;font-weight:bold}
.odds{color:#00ff9d;font-weight:bold}
.user{font-size:14px;color:#00ff9d;text-align:center;margin-bottom:8px}
.balance{font-size:18px;color:#ffdf00;text-align:center;font-weight:bold;margin-bottom:15px}
</style>
</head>

<body>
<div class="box">
<h2>🎫 STG7 SINGLE BET</h2>
<div class="user" id="userBox">Checking login...</div>
<div class="balance" id="balanceBox">Balance: Loading...</div>
<div id="matchList"><p class="small">Loading matches...</p></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore, collection, doc, getDoc, onSnapshot,
  addDoc, updateDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentBalance = 0;

const matchList = document.getElementById("matchList");
const userBox = document.getElementById("userBox");
const balanceBox = document.getElementById("balanceBox");

function showBalance(amount){
  balanceBox.innerText = "Balance: " + Number(amount || 0).toLocaleString() + " Ks";
}

onAuthStateChanged(auth, (user) => {
  if (!user) {
    alert("Login အရင်ဝင်ပါ");
    location.href = "login.html";
    return;
  }

  currentUser = user;
  userBox.innerText = "Login: " + user.email;

  const userRef = doc(db, "users", user.uid);
  onSnapshot(userRef, (snap) => {
    if (snap.exists()) {
      currentBalance = Number(snap.data().balance || 0);
      showBalance(currentBalance);
    } else {
      currentBalance = 0;
      showBalance(0);
    }
  });
});

window.openBet = function(id){
  document.querySelectorAll(".betForm").forEach(f => f.style.display = "none");
  document.getElementById("form_" + id).style.display = "block";
};

window.closeBet = function(id){
  document.getElementById("form_" + id).style.display = "none";
};

window.quickStake = function(id, amount){
  document.getElementById("stake_" + id).value = amount;
};

window.saveBet = async function(id){
  if (!currentUser) {
    alert("Login အရင်ဝင်ပါ");
    location.href = "login.html";
    return;
  }

  const m = window.matchesData.find(x => x.id === id);
  const betType = document.getElementById("betType_" + id).value;
  const stake = Number(document.getElementById("stake_" + id).value || 0);

  if(!stake || stake <= 0){
    alert("လောင်းငွေထည့်ပါ");
    return;
  }

  const userRef = doc(db, "users", currentUser.uid);
  const userSnap = await getDoc(userRef);

  if (!userSnap.exists()) {
    alert("User wallet မတွေ့ပါ");
    return;
  }

  const balance = Number(userSnap.data().balance || 0);

  if (balance < stake) {
    alert("လက်ကျန်ငွေ မလုံလောက်ပါ");
    return;
  }

  try{
    await addDoc(collection(db,"bets"),{
      userId: currentUser.uid,
      userEmail: currentUser.email,

      matchId: id,
      match: (m.home || "") + " vs " + (m.away || ""),
      league: m.league || m.body || "",
      date: m.date || "",
      time: m.time || m.kr || "",
      home: m.home || "",
      away: m.away || "",
      betType: betType,
      goal: m.goal || "",
      odds: m.odds || m.body || "",
      stake: stake,
      status: "Pending",
      winAmount: 0,
      createdAt: serverTimestamp()
    });

    await updateDoc(userRef, {
      balance: balance - stake
    });

    alert("BET SAVED SUCCESS");
    document.getElementById("stake_" + id).value = "";
    closeBet(id);

  }catch(error){
    alert("ERROR: " + error.message);
  }
};

onSnapshot(collection(db,"matches"),(snapshot)=>{
  window.matchesData = [];
  let html = "";

  if(snapshot.empty){
    matchList.innerHTML = "<p class='small'>No matches yet</p>";
    return;
  }

  snapshot.forEach((docSnap)=>{
    const m = { id: docSnap.id, ...docSnap.data() };
    window.matchesData.push(m);

    html += `
      <div class="card">
        <div class="match">⚽ ${m.home || ""} vs ${m.away || ""}</div>
        <div class="info">🏆 ${m.league || m.body || "League"}</div>
        <div class="info">📅 ${m.date || ""} ⏰ ${m.time || m.kr || ""}</div>
        <div class="info goal">ဂိုးလိုင်း: ${m.goal || "-"}</div>
        <div class="info odds">ပေါက်ကြေး: ${m.odds || m.body || "-"}</div>

        <button onclick="openBet('${docSnap.id}')">BET</button>

        <div class="betForm" id="form_${docSnap.id}" style="display:none">
          <select id="betType_${docSnap.id}">
            <option value="Over">Over</option>
            <option value="Under">Under</option>
            <option value="Home">Home</option>
            <option value="Away">Away</option>
            <option value="Draw">Draw</option>
          </select>

          <input id="stake_${docSnap.id}" type="number" placeholder="လောင်းငွေ ဥပမာ 50000">

          <div class="quick">
            <button onclick="quickStake('${docSnap.id}',10000)">10,000</button>
            <button onclick="quickStake('${docSnap.id}',20000)">20,000</button>
            <button onclick="quickStake('${docSnap.id}',50000)">50,000</button>
            <button onclick="quickStake('${docSnap.id}',100000)">100,000</button>
            <button onclick="quickStake('${docSnap.id}',200000)">200,000</button>
            <button onclick="quickStake('${docSnap.id}',500000)">500,000</button>
            <button onclick="quickStake('${docSnap.id}',1000000)">1,000,000</button>
            <button onclick="quickStake('${docSnap.id}',2000000)">2,000,000</button>
          </div>

          <button onclick="saveBet('${docSnap.id}')">CONFIRM BET</button>
          <button class="close" onclick="closeBet('${docSnap.id}')">CANCEL</button>
        </div>
      </div>
    `;
  });

  matchList.innerHTML = html;
});
</script>
</body>
</html>
