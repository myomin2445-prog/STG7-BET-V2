<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STG7 Single Bet</title>
<style>
body{margin:0;background:#0b0b0b;color:white;font-family:Arial;padding:15px}
.box{max-width:520px;margin:auto}
h2{text-align:center;color:#fff}
.card{background:#1b1b1b;padding:15px;border-radius:12px;margin:12px 0}
input,select,button{width:100%;padding:13px;margin:7px 0;border:0;border-radius:8px;box-sizing:border-box;font-size:16px}
button{background:#00a000;color:white;font-weight:bold}
.quick{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.quick button{background:#333}
.small{color:#bbb;font-size:13px}
</style>
</head>

<body>
<div class="box">

<h2>🎫 STG7 SINGLE BET</h2>

<div class="card">
  <input id="match" placeholder="Match - Liverpool vs Chelsea">
  <input id="league" placeholder="League - Premier League">

  <select id="betType">
    <option value="Over">Over</option>
    <option value="Under">Under</option>
    <option value="Home">Home</option>
    <option value="Away">Away</option>
    <option value="Draw">Draw</option>
  </select>

  <input id="goal" placeholder="ဂိုးလိုင်း ဥပမာ 2.5+50">
  <input id="odds" placeholder="ပေါက်ကြေး ဥပမာ 3+80 / =40 / 2-80">
  <input id="stake" type="number" placeholder="လောင်းငွေ ဥပမာ 50000">

  <div class="quick">
    <button onclick="setStake(10000)">10000</button>
    <button onclick="setStake(20000)">20000</button>
    <button onclick="setStake(50000)">50000</button>
    <button onclick="setStake(100000)">100000</button>
  </div>

  <button id="betBtn">BET NOW</button>
  <p class="small">Status: Pending အနေနဲ့ သိမ်းမယ်</p>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.setStake = function(amount){
  document.getElementById("stake").value = amount;
};

document.getElementById("betBtn").onclick = async function(){
  try{
    await addDoc(collection(db,"bets"),{
      match: document.getElementById("match").value,
      league: document.getElementById("league").value,
      betType: document.getElementById("betType").value,
      goal: document.getElementById("goal").value,
      odds: document.getElementById("odds").value,
      stake: document.getElementById("stake").value,
      status: "Pending",
      createdAt: serverTimestamp()
    });

    alert("BET SAVED SUCCESS");
  }catch(error){
    alert("ERROR: " + error.message);
  }
};
</script>

</body>
</html>
