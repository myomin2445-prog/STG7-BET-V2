<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>STG7 Admin</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:#fff;
    max-width:500px;
    margin:auto;
    padding:20px;
}
h2{
    text-align:center;
}
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:15px;
    background:#0066ff;
    color:#fff;
    border:none;
    font-size:18px;
    cursor:pointer;
}
</style>

</head>
<body>

<h2>STG7 ADMIN</h2>

<input id="date" placeholder="Date">
<input id="kr" placeholder="KR">
<input id="body" placeholder="BODY">
<input id="home" placeholder="HOME">
<input id="result" placeholder="RESULT">
<input id="away" placeholder="AWAY">
<input id="goal" placeholder="GOAL">

<button>SAVE</button>

</body>
</html>
