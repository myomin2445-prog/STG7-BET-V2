<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>My Bets</title>
<style>
body{margin:0;background:#071107;color:white;font-family:Arial;padding:14px;padding-bottom:70px}
.box{max-width:560px;margin:auto}
h2{text-align:center}
.card{background:#101c10;padding:15px;border-radius:14px;margin:12px 0;border:1px solid #1f3d1f}
.match{font-size:21px;font-weight:bold}
.info{color:#ccc;margin:7px 0;font-size:16px}
.status{font-size:20px;font-weight:bold;margin-top:10px}
.small{color:#bbb;font-size:13px}
.nav{position:fixed;bottom:0;left:0;right:0;background:#101c10;border-top:1px solid #1f3d1f;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;padding:8px 0}
.nav a{text-align:center;color:white;text-decoration:none;font-size:13px}
</style>
</head>

<body>
<div class="box">
<h2>🎫 MY BETS</h2>
<div id="userBox" class="small">Checking login...</div>
<div id="list"><p class="small">Loading...</p></div>
</div>

<div class="nav">
  <a href="index.html">🏠<br>Home</a>
  <a href="bet.html">⚽<br>Bet</a>
  <a href="mybets.html">🎫<br>My Bets</a>
  <a href="wallet.html">💰<br>Wallet</a>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
import {
  getFirestore,
  collection,
  query,
  where,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCACJcBCTRQptANEsAU40dxtpRDnF2vQ3M",
  authDomain: "stg7-bet-v2.firebaseapp.com",
  projectId: "stg7-bet-v2",
  storageBucket: "stg7-bet-v2.firebasestorage.app",
  messagingSenderId: "1042658872289",
  appId: "1:1042658872289:web:f70c7cb766367f7fe9a0a0"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const list = document.getElementById("list");
const userBox = document.getElementById("userBox");
const money = n => Number(n || 0).toLocaleString() + " Ks";

function statusColor(status){
  if(status === "Won") return "lime";
  if(status === "Lost") return "red";
  return "yellow";
}

function renderBet(b){
  return `
    <div class="card">
      <div class="match">⚽ ${b.match || "-"}</div>
      <div class="info">👤 ${b.userEmail || "-"}</div>
      <div class="info">🏆 League : ${b.league || "-"}</div>
      <div class="info">📅 ${b.date || "-"} ⏰ ${b.time || "-"}</div>
      <div class="info">🎯 Bet : ${b.betType || "-"}</div>
      <div class="info">🥅 Goal : ${b.goal || "-"}</div>
      <div class="info">💰 Odds : ${b.odds || "-"}</div>
      <div class="info">💵 Stake : ${money(b.stake)}</div>
      <div class="info">🏅 Win : ${money(b.winAmount)}</div>
      <div class="status" style="color:${statusColor(b.status)}">${b.status || "Pending"}</div>
    </div>
  `;
}

onAuthStateChanged(auth, user=>{
  if(!user){
    location.href = "login.html";
    return;
  }

  userBox.innerText = "Login: " + user.email;

  const q = query(
    collection(db,"bets"),
    where("userId","==",user.uid)
  );

  onSnapshot(q, snap=>{
    let bets = [];

    snap.forEach(d=>{
      bets.push(d.data());
    });

    bets.sort((a,b)=>{
      const ta = a.createdAt?.seconds || 0;
      const tb = b.createdAt?.seconds || 0;
      return tb - ta;
    });

    if(bets.length === 0){
      list.innerHTML = "<p class='small'>Bet မရှိသေးပါ</p>";
      return;
    }

    list.innerHTML = bets.map(renderBet).join("");

  }, error=>{
    list.innerHTML = "<p class='small'>Error: " + error.message + "</p>";
  });
});
</script>
</body>
</html>
